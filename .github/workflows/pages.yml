name: GitHub Pages確認環境

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: publicディレクトリをPagesへデプロイ
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pagesを設定
        uses: actions/configure-pages@v5

      - name: publicディレクトリをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
