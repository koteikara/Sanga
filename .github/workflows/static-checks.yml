name: Static Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-checks:
    name: 静的検証
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsを設定
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Git差分の空白エラーを確認
        run: git diff --check

      - name: 日程JSONを検証
        run: node tools/validate-matches.js

      - name: 生成JSONを厳格検証
        run: node tools/validate-generated-matches.js public/data/matches.json --expected-count 38 --strict

      - name: JavaScript構文を検証
        run: node --check public/assets/app.js

      - name: JavaScript契約を検証
        run: node tools/validate-app-contract.js

      - name: CSS波括弧数を検証
        run: |
          python - <<'PY'
          from pathlib import Path

          css = Path('public/assets/style.css').read_text(encoding='utf-8')
          open_count = css.count('{')
          close_count = css.count('}')

          if open_count != close_count:
              raise SystemExit(f'CSS brace count mismatch: {{={open_count}, }}={close_count}')

          print(f'CSS brace count OK: {{={open_count}, }}={close_count}')
          PY

      - name: HTMLのCSS/JS参照を検証
        run: |
          python - <<'PY'
          from pathlib import Path

          html = Path('public/sanga202627season.html').read_text(encoding='utf-8')
          required_refs = [
              'assets/style.css',
              'assets/app.js',
          ]
          missing = [ref for ref in required_refs if ref not in html]

          if missing:
              raise SystemExit('Missing HTML asset reference(s): ' + ', '.join(missing))

          print('HTML asset references OK: ' + ', '.join(required_refs))
          PY
